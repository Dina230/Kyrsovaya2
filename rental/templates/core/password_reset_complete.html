{% extends 'base.html' %}

{% block title %}Пароль изменён{% endblock %}

{% block content %}
<div class="auth-page auth-shell py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card auth-card border-0">
                    <div class="auth-card-header auth-card-header--success">
                        <div class="auth-card-icon" aria-hidden="true">
                            <i class="bi bi-check-lg"></i>
                        </div>
                        <h1 class="auth-card-title">Готово</h1>
                        <p class="auth-card-sub">Пароль успешно изменён</p>
                    </div>
                    <div class="card-body auth-card-body-soft p-4 p-md-5 text-center">
                        <p class="text-secondary small mb-4">
                            Можно войти с новым паролём.
                        </p>
                        <div class="d-grid gap-2">
                            <a href="{% url 'login' %}" class="btn btn-lg rounded-3 py-3 auth-btn-primary-lg d-inline-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-box-arrow-in-right"></i>Войти
                            </a>
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg rounded-3">
                                <i class="bi bi-house me-1"></i>На главную
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
