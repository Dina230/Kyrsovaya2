{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="auth-page auth-shell py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card auth-card border-0">
                    <div class="auth-card-header">
                        <div class="auth-card-icon" aria-hidden="true">
                            <i class="bi bi-box-arrow-in-right"></i>
                        </div>
                        <h1 class="auth-card-title">Вход в систему</h1>
                        <p class="auth-card-sub">Войдите в аккаунт «Простор»</p>
                    </div>
                    <div class="card-body auth-card-body-soft p-4 p-md-5">
                        {% if form.errors %}
                        <div class="alert alert-danger border-0 rounded-3" role="alert">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            Неверное имя пользователя или пароль.
                        </div>
                        {% endif %}

                        <form method="post" novalidate>
                            {% csrf_token %}

                            <div class="mb-4">
                                <label for="id_username" class="form-label auth-input-label fw-semibold">
                                    Имя пользователя или Email
                                </label>
                                <input type="text" name="username" id="id_username"
                                       class="form-control form-control-lg rounded-3 auth-input-field"
                                       placeholder="Логин или email"
                                       required autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="id_password" class="form-label auth-input-label fw-semibold">
                                    Пароль
                                </label>
                                <div class="input-group input-group-lg password-toggle">
                                    <input type="password" name="password" id="id_password"
                                           class="form-control form-control-lg rounded-start-3 auth-input-field"
                                           placeholder="••••••••"
                                           required autocomplete="current-password">
                                    <button type="button" class="btn btn-outline-secondary rounded-end-3"
                                            data-password-toggle
                                            aria-label="Показать пароль" title="Показать пароль">
                                        <i class="bi bi-eye" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="text-end mb-4">
                                <a href="{% url 'password_reset' %}" class="auth-forgot-link small">
                                    Забыли пароль?
                                </a>
                            </div>

                            <div class="d-grid gap-2 mb-2">
                                <button type="submit" class="btn btn-lg rounded-3 py-3 auth-btn-primary-lg">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4 pt-3 border-top auth-link-muted">
                            <span>Нет аккаунта?</span>
                            <a href="{% url 'register' %}" class="ms-1">Зарегистрироваться</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
